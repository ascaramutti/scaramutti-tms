# ==========================================
# Docker Compose - Producción
# ==========================================
version: '3.8'

services:
  # ==========================================
  # Base de Datos PostgreSQL
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: scaramutti-tms-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-scaramutti_tms_prod}
    ports:
      - "5432:5432"
    volumes:
      - scaramutti_tms_db_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-scaramutti_tms_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ==========================================
  # Backend (Node.js optimizado)
  # ==========================================
  backend:
    build:
      context: ./backend
      target: production
    container_name: scaramutti-tms-backend-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-scaramutti_tms_prod}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      # --- SSO con v2 (ver token-verifier.ts) ---
      # legacy = solo HS256 propio (default, comportamiento histórico)
      # dual   = acepta tokens RS256 de v2 + HS256 propio (transición)
      # rs256  = solo tokens de v2 (estado final)
      AUTH_MODE: ${AUTH_MODE:-legacy}
      JWT_PUBLIC_KEY_PATH: /app/keys/v2-publickey.pem
      # Variables de versionado
      APP_VERSION: ${APP_VERSION:-v1.0.0}
      DEPLOY_DATE: ${DEPLOY_DATE:-unknown}
    volumes:
      # Clave PÚBLICA de v2 (verifica tokens; no permite emitirlos).
      # En el server: ~/scaramutti-tms-v2/keys/publickey.pem (repo v2 hermano).
      - ../scaramutti-tms-v2/keys/publickey.pem:/app/keys/v2-publickey.pem:ro
    # No exponer puerto 3000 al exterior, solo interno a través del proxy
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # Frontend (Nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: /api
    container_name: scaramutti-tms-frontend-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

volumes:
  scaramutti_tms_db_prod_data:
